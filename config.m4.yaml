# GeoResearcher M4 demo 配置（plan-m4 §7：独立库路径，隔离 M2/M3 库）
# 使用：uv run georesearcher --config config.m4.yaml <command>
models:
  llm:
    provider: deepseek
    base_url: https://api.deepseek.com
    model: deepseek-chat
    temperature: 0.3
    api_key_env: DEEPSEEK_API_KEY
  judge:
    provider: deepseek
    base_url: https://api.deepseek.com
    model: deepseek-chat
    temperature: 0.0
    api_key_env: DEEPSEEK_API_KEY
  embedding:
    provider: local
    model: BAAI/bge-m3
    device: cpu

storage:
  vector_store:
    backend: chroma
    persist_dir: ./data/m4/chroma
    collection: papers
  sqlite:
    path: ./data/m4/georesearcher.db
  files:
    pdf_dir: ./data/m4/pdfs
    figure_dir: ./data/m4/figures
    report_dir: ./data/m4/reports

retrieval:
  top_k: 5
  use_hyde: true
  use_multi_query: true
  use_reranker: true
  use_bm25: true
  use_cross_encoder: true
  rrf_k: 60
  hybrid_candidates: 40
  rerank_candidates: 20

evaluation:
  eval_set_path: ./tests/eval_set/eval_set.json
  top_k: 5
  eval_generation: true
  run_ragas: false
  report_dir: ./data/m4/reports
  diagnosis:
    hit_rate_low: 0.6
    faithfulness_low: 0.7

search:
  provider: openalex
  mailto: georesearcher@example.com
  rate_limit_per_sec: 3.0
  timeout: 20.0
  max_retries: 2
  limit_default: 10

orchestration:
  router_confidence_threshold: 0.6
  search_min_hits: 3
  search_max_rounds: 2
  crag_quality_threshold: 0.3
  crag_max_rounds: 1
  review_max_rounds: 3
  clarify_max_rounds: 2
  checkpoint_path: ./data/m4/checkpoints.sqlite

# GeoResearcher 集中配置（ADR-07：切后端/模型只改这里）
# 执行者注意：密钥不写这里，走 .env（见 .env.example）。

models:
  llm:
    provider: deepseek            # OpenAI 兼容
    base_url: https://api.deepseek.com
    model: deepseek-chat          # 推理任务可换 deepseek-reasoner
    temperature: 0.3
    api_key_env: DEEPSEEK_API_KEY # 从该环境变量读取，勿硬编码
  judge:                          # RAG 评估用；默认同 LLM，验证期可切强模型
    provider: deepseek
    base_url: https://api.deepseek.com
    model: deepseek-chat
    temperature: 0.0
    api_key_env: DEEPSEEK_API_KEY
  embedding:
    provider: local               # 本地 bge，消除外部依赖
    model: BAAI/bge-m3            # 快速体验可换 BAAI/bge-small-zh-v1.5
    device: cpu                   # 有 GPU 可设 cuda / mps

storage:
  vector_store:
    backend: chroma               # chroma（默认，嵌入式） | milvus（生产，留桩）
    persist_dir: ./data/chroma
    collection: papers
  sqlite:
    path: ./data/georesearcher.db
  files:
    pdf_dir: ./data/pdfs
    figure_dir: ./data/figures
    report_dir: ./data/reports

retrieval:
  top_k: 5
  use_hyde: true
  use_multi_query: true
  use_reranker: true
  use_bm25: true                # BM25 稀疏检索
  use_cross_encoder: true       # 交叉编码器精细排序
  rrf_k: 60                     # RRF 融合参数
  hybrid_candidates: 40         # 各检索器召回数
  rerank_candidates: 20         # 进入交叉编码器的候选数

evaluation:
  eval_set_path: ./tests/eval_set/eval_set.json
  top_k: 5
  eval_generation: true
  run_ragas: false                # 需 uv sync --extra eval 才生效，否则优雅跳过
  report_dir: ./data/reports
  diagnosis:                      # 诊断阈值（经验值，非绝对）
    hit_rate_low: 0.6             # 检索 hit_rate 低于此 → 判"检索层弱"
    faithfulness_low: 0.7         # 生成 faithfulness 低于此 → 判"生成层弱"

search:                           # M3 检索配置（plan-m3 §4）
  provider: openalex              # A1：默认唯一实现；arxiv/semantic_scholar 为桩
  mailto: null                    # A2 polite pool：填你的邮箱
  rate_limit_per_sec: 3.0         # A2 客户端限速
  timeout: 20.0
  max_retries: 2
  limit_default: 10

paths:
  data_dir: ./data
